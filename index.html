<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Premium IGSOSA Birthday Flyer Generator</title>
    <!-- Modern Typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
      :root {
        --theme-base: 260 60% 15%;
        --theme-accent: 45 90% 50%;
        --theme-glow: 45 90% 50%;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.7);
      }

      @keyframes mesh-gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes float-gentle {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(2deg);
        }
      }

      @keyframes pulse-soft {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.1);
        }
      }

      .mesh-bg {
        background: linear-gradient(
          -45deg,
          hsl(var(--theme-base)),
          #1a1a1a,
          #2d1b4e,
          #0a0a0a
        );
        background-size: 400% 400%;
        animation: mesh-gradient 15s ease infinite;
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .premium-shadow {
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.5),
          0 0 40px rgba(var(--theme-accent), 0.1);
      }

      .premium-title {
        background: linear-gradient(
          to bottom,
          #fff 30%,
          hsl(var(--theme-accent)) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 15px rgba(var(--theme-accent), 0.3));
      }

      .gold-border {
        position: relative;
        padding: 4px;
        background: linear-gradient(
          135deg,
          hsl(var(--theme-accent)),
          #fff,
          hsl(var(--theme-accent))
        );
        border-radius: 9999px;
      }

      .inner-border {
        background: #000;
        border-radius: 9999px;
        padding: 4px;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "theme-accent": "hsl(var(--theme-accent))",
              "theme-base": "hsl(var(--theme-base))",
            },
            fontFamily: {
              display: ["Outfit", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-[#0a0a09] font-body min-h-screen flex flex-col items-center justify-center p-4 md:p-8 gap-8"
  >
    <!-- Control Panel -->
    <div class="w-full max-w-[640px] glass-card p-6 rounded-2xl z-50">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-white flex items-center gap-2">
          <span class="material-symbols-outlined text-theme-accent"
            >edit_note</span
          >
          Flyer Customization
        </h3>
        <button
          id="regenThemeBtn"
          class="flex items-center gap-2 px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm font-semibold transition-all"
        >
          <span class="material-symbols-outlined text-sm">palette</span>
          Shuffle Style
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label
            class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1"
            >Celebrant Name</label
          >
          <input
            type="text"
            id="nameInput"
            placeholder="Enter name..."
            class="w-full bg-white/5 border-white/10 rounded-xl px-4 py-3 text-white focus:ring-theme-accent focus:border-theme-accent transition-all placeholder:text-white/20"
          />
        </div>
        <div class="space-y-2">
          <label
            class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1"
            >Photo Upload</label
          >
          <div class="relative group">
            <input
              type="file"
              id="photoInput"
              accept="image/*"
              class="hidden"
            />
            <label
              for="photoInput"
              class="flex items-center justify-center w-full bg-white/5 hover:bg-white/10 border-2 border-dashed border-white/10 rounded-xl px-4 py-[11px] text-white/70 cursor-pointer transition-all group-hover:border-theme-accent/50"
            >
              <span class="material-symbols-outlined mr-2"
                >add_photo_alternate</span
              >
              Choose Image
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Flyer Container -->
    <div
      id="flyerWrapper"
      class="w-full overflow-x-auto p-4 group flex justify-center"
    >
      <div
        id="flyer"
        class="relative w-[600px] min-h-[750px] mesh-bg rounded-[2.5rem] overflow-hidden flex flex-col items-center text-white premium-shadow border border-white/10"
      >
        <!-- Animated Overlays -->
        <div class="absolute inset-0 pointer-events-none">
          <div
            class="absolute -top-24 -right-24 w-96 h-96 bg-theme-accent/20 rounded-full blur-[100px] animate-pulse-soft"
          ></div>
          <div
            class="absolute -bottom-24 -left-24 w-96 h-96 bg-purple-500/10 rounded-full blur-[100px] animate-pulse-soft"
            style="animation-delay: 2s"
          ></div>

          <!-- Vector Textures -->
          <div
            class="absolute inset-0 opacity-[0.03]"
            style="
              background-image: radial-gradient(
                circle at 2px 2px,
                white 1px,
                transparent 0
              );
              background-size: 24px 24px;
            "
          ></div>
        </div>

        <!-- Content Layer -->
        <div class="relative z-10 w-full min-h-[750px] flex flex-col py-4 px-4">
          <!-- Premium Header -->
          <header class="flex flex-col items-center mb-4">
            <div class="flex items-center gap-3">
              <div
                class="p-2 bg-white/10 rounded-xl backdrop-blur-md border border-white/10"
              >
                <img
                  src="IGSBlueLogo-newblue2.png"
                  alt="Logo"
                  class="h-6 w-auto brightness-200"
                />
              </div>
              <h2
                class="text-lg font-black tracking-[0.2em] uppercase text-white/90 font-display"
              >
                IGSOSA '07
              </h2>
            </div>
            <div class="w-12 h-[2px] bg-theme-accent/50 rounded-full"></div>
          </header>

          <!-- Main Body -->
          <main
            class="flex-1 flex flex-col items-center justify-center text-center"
          >
            <!-- Dynamic Title -->
            <div class="relative mb-6">
              <h1
                class="premium-title text-2xl md:text-3xl font-black leading-tight tracking-tighter uppercase font-display italic"
              >
                <span class="text-3xl md:text-4xl"> Happy Birthday</span>
              </h1>
              <!-- <span
                class="material-symbols-outlined absolute -top-4 -right-8 text-4xl text-theme-accent/60 animate-bounce"
                style="animation-duration: 3s"
                >auto_awesome</span
              > -->
            </div>

            <!-- Enhanced Photo Frame -->
            <div class="relative mb-6">
              <div
                class="gold-border group-hover:scale-105 transition-transform duration-700"
              >
                <div class="inner-border">
                  <div
                    class="relative size-56 md:size-64 rounded-full overflow-hidden bg-zinc-900 border border-white/20"
                  >
                    <img
                      id="userImage"
                      src="IGSOSA_Birthday.png"
                      alt="Celebrant"
                      class="w-full h-full object-cover object-top transition-all duration-700"
                    />
                    <!-- Subtle Gradient Overlays -->
                    <div
                      class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"
                    ></div>
                  </div>
                </div>
              </div>
              <!-- Floating Icons -->
              <!-- <span
                class="material-symbols-outlined absolute -bottom-2 -right-2 bg-theme-accent text-black p-2 rounded-full text-sm shadow-xl border-4 border-[#0a0a0a]"
                >verified</span
              > -->
            </div>

            <!-- Name & Badge -->
            <div class="space-y-3">
              <div class="relative inline-block">
                <h2
                  id="userName"
                  class="text-3xl md:text-4xl font-black text-white tracking-tight drop-shadow-2xl font-display break-words max-w-[500px] text-center"
                >
                  [Celebrant Name]
                </h2>
                <div
                  class="absolute -bottom-1 left-0 w-full h-1 bg-gradient-to-r from-transparent via-theme-accent/30 to-transparent"
                ></div>
              </div>

              <div class="flex items-center justify-center gap-2">
                <div
                  class="px-4 py-1.5 rounded-full bg-white/5 border border-white/10 backdrop-blur-md"
                >
                  <span
                    class="text-[10px] font-black uppercase tracking-[0.3em] text-theme-accent/80"
                    >Distinguished Grammarian</span
                  >
                </div>
              </div>
            </div>

            <!-- Message Card -->
            <div class="mt-6 max-w-[320px] mx-auto italic">
              <p
                id="birthdayMessage"
                class="text-sm md:text-base text-white/70 leading-relaxed font-light font-body"
              >
                "May your special day be filled with as much light and joy as
                you bring to the IGSOSA '07 family."
              </p>
            </div>
          </main>

          <!-- Premium Footer -->
          <footer
            class="mt-auto pt-6 flex flex-col items-center border-t border-white/5"
          >
            <p class="text-[8px] font-bold text-white/30 tracking-[0.4em] mb-3">
              Deo et patria || For God and Fatherland || Fun Ọlọrun ati Ilẹ̀ wa
            </p>

            <div class="flex items-center gap-4">
              <span
                class="material-symbols-outlined text-theme-accent/40 text-sm"
                >stars</span
              >
              <div class="h-1 w-1 rounded-full bg-white/20"></div>
              <span
                class="material-symbols-outlined text-theme-accent/40 text-sm"
                >celebration</span
              >
              <div class="h-1 w-1 rounded-full bg-white/20"></div>
              <span
                class="material-symbols-outlined text-theme-accent/40 text-sm"
                >stars</span
              >
            </div>
          </footer>
        </div>

        <!-- Background Image layer (Hidden by default, used for blur) -->
        <div
          id="backgroundImageLayer"
          class="absolute inset-0 opacity-10 blur-2xl scale-125 saturate-150 transition-opacity duration-1000"
        >
          <img
            id="backgroundImage"
            alt=""
            class="w-full h-full object-cover"
            style="display: none"
          />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <button
      id="downloadBtn"
      disabled
      class="fixed bottom-8 right-8 bg-theme-accent text-black font-black py-4 px-8 rounded-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3 z-50 disabled:opacity-20 disabled:grayscale group"
    >
      <span
        class="material-symbols-outlined group-hover:rotate-12 transition-transform"
        >download_done</span
      >
      Generate High-Res Flyer
    </button>

    <script>
      const themes = [
        { base: "260 60% 15%", accent: "45 90% 50%" }, // Royal Purple & Gold
        { base: "180 60% 12%", accent: "160 80% 60%" }, // Deep Teal & Mint
        { base: "340 60% 15%", accent: "330 90% 70%" }, // Velvet Rose & Pink
        { base: "210 70% 12%", accent: "190 90% 60%" }, // Midnight Blue & Cyan
        { base: "0 0% 5%", accent: "45 90% 60%" }, // Obsidian & Gold
        { base: "160 60% 10%", accent: "80 80% 60%" }, // Forest & Lime
        { base: "280 50% 15%", accent: "300 90% 70%" }, // Amethyst & Fuchsia
        { base: "20 60% 15%", accent: "35 90% 60%" }, // Mahogany & Amber
      ];

      const messages = [
        "May your special day be filled with as much light and joy as you bring to the IGSOSA '07 family.",
        "To a truly distinguished Grammarian, may your new year be marked by unprecedented success and wellness.",
        "Celebrating a legacy of excellence on your special day. Keep shining and inspiring us all!",
        "Wishing you a magnificent birthday filled with love, laughter, and the company of great Grammarians.",
        "Here's to another year of brilliance! May your path be illuminated with joy and prosperity.",
        "On this day, we honor you. May your birthday be as extraordinary as your contribution to our community.",
      ];

      const elements = {
        nameInput: document.getElementById("nameInput"),
        photoInput: document.getElementById("photoInput"),
        userImage: document.getElementById("userImage"),
        backgroundImage: document.getElementById("backgroundImage"),
        userName: document.getElementById("userName"),
        birthdayMessage: document.getElementById("birthdayMessage"),
        downloadBtn: document.getElementById("downloadBtn"),
        root: document.documentElement,
      };

      function updateTheme(index) {
        const theme =
          index !== undefined
            ? themes[index]
            : themes[Math.floor(Math.random() * themes.length)];
        elements.root.style.setProperty("--theme-base", theme.base);
        elements.root.style.setProperty("--theme-accent", theme.accent);
      }

      function updateMessage() {
        elements.birthdayMessage.textContent =
          messages[Math.floor(Math.random() * messages.length)];
      }

      elements.nameInput.addEventListener("input", (e) => {
        const val = e.target.value.trim();
        elements.userName.textContent = val || "[Celebrant Name]";
        elements.downloadBtn.disabled = !val;

        if (val) {
          const hash = [...val].reduce(
            (acc, char) => char.charCodeAt(0) + ((acc << 5) - acc),
            0,
          );
          updateTheme(Math.abs(hash) % themes.length);
        }
      });

      elements.photoInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            elements.userImage.src = event.target.result;
            elements.backgroundImage.src = event.target.result;
            elements.backgroundImage.style.display = "block";
            updateMessage();
          };
          reader.readAsDataURL(file);
        }
      });

      document
        .getElementById("regenThemeBtn")
        .addEventListener("click", () => updateTheme());

      elements.downloadBtn.addEventListener("click", async function () {
        const originalContent = this.innerHTML;
        this.innerHTML =
          '<span class="material-symbols-outlined animate-spin">sync</span> Rendering...';
        this.disabled = true;

        try {
          const canvas = await html2canvas(document.getElementById("flyer"), {
            scale: 3, // Ultra High Res
            useCORS: true,
            backgroundColor: null,
            logging: false,
            allowTaint: true,
            windowWidth: 600,
            onclone: (clonedDoc) => {
              const f = clonedDoc.getElementById("flyer");
              f.style.borderRadius = "2.5rem";
              f.style.transform = "none";
              f.style.margin = "0";
              f.style.position = "relative";
              f.style.height = "auto";
              f.style.minHeight = "750px";

              // Fix gradient text export issue
              const title = clonedDoc.querySelector(".premium-title");
              if (title) {
                title.style.webkitTextFillColor = "hsl(var(--theme-accent))";
                title.style.color = "hsl(var(--theme-accent))";
                title.style.background = "none";
              }
            },
          });

          const link = document.createElement("a");
          link.download = `IGSOSA_2024_${elements.userName.textContent.replace(/\s+/g, "_")}.png`;
          link.href = canvas.toDataURL("image/png", 1.0);
          link.click();

          this.innerHTML =
            '<span class="material-symbols-outlined text-green-400">check_circle</span> Flyer Ready!';
        } catch (err) {
          console.error(err);
          this.innerHTML = "Error!";
        } finally {
          setTimeout(() => {
            this.innerHTML = originalContent;
            this.disabled = false;
          }, 2000);
        }
      });
    </script>
  </body>
</html>
