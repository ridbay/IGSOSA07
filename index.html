<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Premium IGSOSA Birthday Flyer Generator</title>
    <!-- Modern Typography -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@2.9.5/dist/dom-to-image-more.min.js"></script>
    <style>
      :root {
        --theme-base: 260 60% 15%;
        --theme-accent: 45 90% 50%;
        --theme-glow: 45 90% 50%;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.7);
      }

      @keyframes mesh-gradient {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes float-gentle {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(2deg);
        }
      }

      @keyframes pulse-soft {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.1);
        }
      }

      .mesh-bg {
        background: linear-gradient(
          -45deg,
          hsl(var(--theme-base)),
          #1a1a1a,
          #2d1b4e,
          #0a0a0a
        );
        background-size: 400% 400%;
        animation: mesh-gradient 15s ease infinite;
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .premium-shadow {
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.5),
          0 0 40px rgba(var(--theme-accent), 0.1);
      }

      .premium-title {
        background: linear-gradient(
          to bottom,
          #fff 30%,
          hsl(var(--theme-accent)) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 15px rgba(var(--theme-accent), 0.3));
      }

      .gold-border {
        position: relative;
        padding: 4px;
        background: linear-gradient(
          135deg,
          hsl(var(--theme-accent)),
          #fff,
          hsl(var(--theme-accent))
        );
        border-radius: 9999px;
      }

      .inner-border {
        background: #000;
        border-radius: 9999px;
        padding: 4px;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      /* Capture Mode for html2canvas */
      .capture-mode * {
        animation: none !important;
        transition: none !important;
      }

      .capture-mode .mesh-bg {
        background: linear-gradient(
          135deg,
          hsl(var(--theme-base)),
          #1a1a1a,
          #2d1b4e
        ) !important;
        background-size: cover !important;
      }

      .capture-mode .glass-card {
        backdrop-filter: none !important;
        background: rgba(255, 255, 255, 0.06) !important;
      }

      .capture-mode .premium-title {
        /* Preserve gradients for dom-to-image-more */
        filter: none !important;
      }

      .capture-mode .blur-2xl {
        filter: blur(40px) !important;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "theme-accent": "hsl(var(--theme-accent))",
              "theme-base": "hsl(var(--theme-base))",
            },
            fontFamily: {
              display: ["Outfit", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-[#0a0a09] font-body min-h-screen flex flex-col items-center justify-center p-4 md:p-8 gap-8"
  >
    <!-- Control Panel -->
    <div class="w-full max-w-[640px] glass-card p-6 rounded-2xl z-50">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-white flex items-center gap-2">
          <span class="material-symbols-outlined text-theme-accent"
            >edit_note</span
          >
          Birthday Flyer Customization
        </h3>
        <button
          id="regenThemeBtn"
          class="flex items-center gap-2 px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full text-sm font-semibold transition-all"
        >
          <span class="material-symbols-outlined text-sm">palette</span>
          Shuffle Style
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label
            class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1"
            >Celebrant Name</label
          >
          <input
            type="text"
            id="nameInput"
            placeholder="Enter name..."
            class="w-full bg-white/5 border-white/10 rounded-xl px-4 py-3 text-white focus:ring-theme-accent focus:border-theme-accent transition-all placeholder:text-white/20"
          />
        </div>
        <div class="space-y-2">
          <label
            class="text-xs font-bold text-white/50 uppercase tracking-widest pl-1"
            >Photo Upload</label
          >
          <div class="relative group">
            <input
              type="file"
              id="photoInput"
              accept="image/*"
              class="hidden"
            />
            <label
              for="photoInput"
              class="flex items-center justify-center w-full bg-white/5 hover:bg-white/10 border-2 border-dashed border-white/10 rounded-xl px-4 py-[11px] text-white/70 cursor-pointer transition-all group-hover:border-theme-accent/50"
            >
              <span class="material-symbols-outlined mr-2"
                >add_photo_alternate</span
              >
              Choose Image
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Flyer Container -->
    <div
      id="flyerWrapper"
      class="w-full overflow-x-auto p-4 group flex justify-center"
    >
      <div
        id="flyer"
        class="relative w-[600px] min-h-[750px] mesh-bg rounded-[2.5rem] overflow-hidden flex flex-col items-center text-white premium-shadow border border-white/10"
      >
        <!-- Animated Overlays -->
        <div class="absolute inset-0 pointer-events-none">
          <div
            class="absolute -top-24 -right-24 w-96 h-96 bg-theme-accent/20 rounded-full blur-[100px] animate-pulse-soft"
          ></div>
          <div
            class="absolute -bottom-24 -left-24 w-96 h-96 bg-purple-500/10 rounded-full blur-[100px] animate-pulse-soft"
            style="animation-delay: 2s"
          ></div>

          <!-- Vector Textures -->
          <div
            class="absolute inset-0 opacity-[0.03]"
            style="
              background-image: radial-gradient(
                circle at 2px 2px,
                white 1px,
                transparent 0
              );
              background-size: 24px 24px;
            "
          ></div>
        </div>

        <!-- Content Layer -->
        <div class="relative z-10 w-full min-h-[750px] flex flex-col py-4 px-4">
          <!-- Premium Header -->
          <header class="flex flex-col items-center mb-4">
            <div class="flex items-center gap-3">
              <div
                class="p-2 bg-white/10 rounded-xl backdrop-blur-md border border-white/10"
              >
                <img
                  src="IGSBlueLogo-newblue2.png"
                  alt="Logo"
                  class="h-6 w-auto brightness-200"
                />
              </div>
              <h2
                class="text-lg font-black tracking-[0.2em] uppercase text-white/90 font-display whitespace-nowrap"
              >
                IGSOSA '07
              </h2>
            </div>
            <div class="w-12 h-[2px] bg-theme-accent/50 rounded-full"></div>
          </header>

          <!-- Main Body -->
          <main
            class="flex-1 flex flex-col items-center justify-center text-center gap-6"
          >
            <!-- Dynamic Title -->
            <div class="relative mb-1">
              <h1
                class="premium-title text-2xl md:text-3xl font-black leading-tight tracking-tighter uppercase font-display italic"
              >
                <span class="text-3xl md:text-4xl"> Happy Birthday</span>
              </h1>
              <!-- <span
                class="material-symbols-outlined absolute -top-4 -right-8 text-4xl text-theme-accent/60 animate-bounce"
                style="animation-duration: 3s"
                >auto_awesome</span
              > -->
            </div>

            <!-- Enhanced Photo Frame -->
            <div class="relative mb-1">
              <div
                class="gold-border group-hover:scale-105 transition-transform duration-700"
              >
                <div class="inner-border">
                  <div
                    class="relative size-56 md:size-64 rounded-full overflow-hidden bg-zinc-900 border border-white/20"
                  >
                    <img
                      id="userImage"
                      src="IGSOSA_Birthday.png"
                      alt="Celebrant"
                      class="w-full h-full object-cover object-top transition-all duration-700"
                    />
                    <!-- Subtle Gradient Overlays -->
                    <div
                      class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"
                    ></div>
                  </div>
                </div>
              </div>
              <!-- Floating Icons -->
              <!-- <span
                class="material-symbols-outlined absolute -bottom-2 -right-2 bg-theme-accent text-black p-2 rounded-full text-sm shadow-xl border-4 border-[#0a0a0a]"
                >verified</span
              > -->
            </div>

            <!-- Name & Badge -->
            <div class="space-y-3">
              <div class="relative w-full">
                <h2
                  id="userName"
                  class="text-3xl md:text-4xl font-black text-white tracking-tight drop-shadow-2xl font-display break-words max-w-[500px] mx-auto text-center leading-tight"
                >
                  [Celebrant Name]
                </h2>
                <div
                  class="absolute -bottom-1 left-0 w-full h-1 bg-gradient-to-r from-transparent via-theme-accent/30 to-transparent"
                ></div>
              </div>

              <div class="flex items-center justify-center gap-2">
                <div
                  class="px-4 py-1.5 rounded-full bg-white/5 border border-white/10 backdrop-blur-md"
                >
                  <span
                    class="text-[10px] font-black uppercase tracking-[0.3em] text-theme-accent/80"
                    >Distinguished Grammarian</span
                  >
                </div>
              </div>
            </div>

            <!-- Message Card -->
            <div class="mt-2 max-w-[320px] mx-auto italic text-center">
              <p
                id="birthdayMessage"
                class="text-sm md:text-base text-white/70 leading-relaxed font-light font-body"
              >
                "May your special day be filled with as much light and joy."
              </p>
            </div>
          </main>

          <!-- Premium Footer -->
          <footer
            class="mt-auto pt-6 flex flex-col items-center border-t border-white/5"
          >
            <p class="text-[8px] font-bold text-white/30 tracking-[0.4em] mb-3">
              Deo et patria || For God and Fatherland || Fun Ọlọrun ati Ilẹ̀ wa
            </p>

            <div class="flex items-center gap-4">
              <span
                class="material-symbols-outlined text-theme-accent/40 text-sm"
                >stars</span
              >
              <div class="h-1 w-1 rounded-full bg-white/20"></div>
              <span
                class="material-symbols-outlined text-theme-accent/40 text-sm"
                >celebration</span
              >
              <div class="h-1 w-1 rounded-full bg-white/20"></div>
              <span
                class="material-symbols-outlined text-theme-accent/40 text-sm"
                >stars</span
              >
            </div>
          </footer>
        </div>

        <!-- Background Image layer (Hidden by default, used for blur) -->
        <div
          id="backgroundImageLayer"
          class="absolute inset-0 opacity-10 blur-2xl scale-125 saturate-150 transition-opacity duration-1000"
        >
          <img
            id="backgroundImage"
            alt=""
            class="w-full h-full object-cover"
            style="display: none"
          />
        </div>
      </div>
    </div>

    <!-- Actions -->
    <button
      id="downloadBtn"
      disabled
      class="fixed bottom-8 right-8 bg-theme-accent text-black font-black py-4 px-8 rounded-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3 z-50 disabled:opacity-20 disabled:grayscale group"
    >
      <span
        class="material-symbols-outlined group-hover:rotate-12 transition-transform"
        >download_done</span
      >
      Generate High-Res Flyer
    </button>

    <script>
      const themes = [
        { base: "260 60% 15%", accent: "45 90% 50%" }, // Royal Purple & Gold
        { base: "180 60% 12%", accent: "160 80% 60%" }, // Deep Teal & Mint
        { base: "340 60% 15%", accent: "330 90% 70%" }, // Velvet Rose & Pink
        { base: "210 70% 12%", accent: "190 90% 60%" }, // Midnight Blue & Cyan
        { base: "0 0% 5%", accent: "45 90% 60%" }, // Obsidian & Gold
        { base: "160 60% 10%", accent: "80 80% 60%" }, // Forest & Lime
        { base: "280 50% 15%", accent: "300 90% 70%" }, // Amethyst & Fuchsia
        { base: "20 60% 15%", accent: "35 90% 60%" }, // Mahogany & Amber
      ];

      const messages = [
        "May your special day be filled with as much light and joy.",
        "To a truly distinguished Grammarian, may your new year be marked by unprecedented success and wellness.",
        "Celebrating a legacy of excellence on your special day. Keep shining and inspiring us all!",
        "Wishing you a magnificent birthday filled with love, laughter, and the company of great Grammarians.",
        "Here's to another year of brilliance! May your path be illuminated with joy and prosperity.",
        "On this day, we honor you. May your birthday be as extraordinary as your contribution to our community.",
        "Sending you warm wishes for a birthday that's as remarkable as your spirit.",
        "May your new age be blessed with happiness that knows no bounds.",
        "Cheering for a fantastic Grammarian! May your year ahead be full of pleasant surprises.",
        "Happy birthday! May your day be a beautiful reflection of the joy you bring to others.",
        "Wishing you a year of breaking boundaries and setting new standards of excellence.",
        "To a fellow Grammarian, may your birthday be the start of your most fulfilling year yet.",
        "May the light of IGS continue to shine through you as you celebrate another wonderful year.",
        "Wishing you joy, peace, and the kind of success that leaves a lasting legacy.",
        "Happy birthday! May your celebration be as vibrant and spirited as our IGSOSA family.",
        "Here's to a year of health, wealth, and countless reasons to smile.",
        "May your birthday be a masterclass in celebration and happiness!",
        "Wishing you the strength to reach new heights and the wisdom to enjoy the view.",
        "To an exceptional individual, may your big day be filled with everything you love most.",
        "Happy birthday! May the future hold even more brilliance for you than the past.",
        "May your special day be a perfect blend of nostalgia and new, exciting beginnings.",
        "Wishing you a day of relaxation and a year of unstoppable momentum.",
        "To a true leader in our community, may your birthday be as inspiring as you are.",
        "May every moment of your birthday be filled with the warmth of friendship and family.",
        "Happy birthday! Keep blazing trails and making the IGSOSA '07 class proud.",
        "Wishing you a monumental year ahead, filled with growth and achievement.",
        "May your birthday cake be as sweet as the memories we share as Grammarians.",
        "To a lifelong learner and achiever, may your new year be your most educational yet.",
        "Happy birthday! May your journey ahead be paved with gold and good fortune.",
        "Wishing you a day that's as grand as the halls of Ibadan Grammar School.",
        "May your birthday marks the beginning of a season of harvest for all your hard work.",
        "Cheers to another year of excellence! You make the IGSOSA legacy look easy.",
        "Wishing you a birthday that is just the beginning of a year full of happy moments.",
        "May you find joy in the simple things and fulfillment in your greatest ambitions.",
        "Happy birthday to a shining star of the '07 set. Your light is truly unique.",
        "Wishing you a day of endless laughter and a lifetime of true happiness.",
        "May your birthday be as legendary as the traditions of our great alma mater.",
        "To a person of substance and style, happy birthday and many happy returns.",
        "Wishing you a year where every dream you chase becomes a reality you live.",
        "Happy birthday! May your spirit remains as youthful as our school days.",
        "May the grace of God follow you into this new year of your life.",
        "Wishing you a birthday that's as iconic as the IGS blue and white.",
        "Cheers to your health and happiness! The best is yet to come for you.",
        "Happy birthday! May your impact on the world continue to grow and inspire.",
        "Wishing you a day of peace and a year of purposeful living.",
        "To a brother/sister in the IGSOSA bond, have a birthday that's truly spectacular.",
        "May your path be clear and your heart be light as you embark on this new age.",
        "Happy birthday! May you be surrounded by love today and every day.",
        "Wishing you a birthday that is as timeless and classic as our school's pride.",
        "May your new year be a symphony of success and a gallery of great memories.",
        "Happy birthday! Here's to surviving and thriving another year with grace.",
        "Wishing you a day of favor and a year of divine acceleration.",
        "To a distinguished Grammarian, may your light never dim and your joy never end.",
      ];

      const elements = {
        nameInput: document.getElementById("nameInput"),
        photoInput: document.getElementById("photoInput"),
        userImage: document.getElementById("userImage"),
        backgroundImage: document.getElementById("backgroundImage"),
        userName: document.getElementById("userName"),
        birthdayMessage: document.getElementById("birthdayMessage"),
        downloadBtn: document.getElementById("downloadBtn"),
        root: document.documentElement,
      };

      function updateTheme(index) {
        const theme =
          index !== undefined
            ? themes[index]
            : themes[Math.floor(Math.random() * themes.length)];
        elements.root.style.setProperty("--theme-base", theme.base);
        elements.root.style.setProperty("--theme-accent", theme.accent);
      }

      function updateMessage() {
        elements.birthdayMessage.textContent =
          messages[Math.floor(Math.random() * messages.length)];
      }

      elements.nameInput.addEventListener("input", (e) => {
        const val = e.target.value.trim();
        elements.userName.textContent = val || "[Celebrant Name]";
        elements.downloadBtn.disabled = !val;

        if (val) {
          const hash = [...val].reduce(
            (acc, char) => char.charCodeAt(0) + ((acc << 5) - acc),
            0,
          );
          updateTheme(Math.abs(hash) % themes.length);
        }
      });

      elements.photoInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            elements.userImage.src = event.target.result;
            elements.backgroundImage.src = event.target.result;
            elements.backgroundImage.style.display = "block";
            updateMessage();
          };
          reader.readAsDataURL(file);
        }
      });

      document
        .getElementById("regenThemeBtn")
        .addEventListener("click", () => updateTheme());

      async function waitForImages(container) {
        const images = container.querySelectorAll("img");
        const promises = [];

        images.forEach((img) => {
          if (!img.complete) {
            promises.push(
              new Promise((resolve) => {
                img.onload = img.onerror = resolve;
              }),
            );
          }
        });

        return Promise.all(promises);
      }

      elements.downloadBtn.addEventListener("click", async function () {
        const originalContent = this.innerHTML;
        const flyer = document.getElementById("flyer");

        this.innerHTML =
          '<span class="material-symbols-outlined animate-spin">sync</span> Rendering...';
        this.disabled = true;

        try {
          /* Enable capture mode */
          document.body.classList.add("capture-mode");

          await new Promise((r) => setTimeout(r, 200)); // allow DOM repaint
          await waitForImages(flyer);
          await document.fonts.ready;

          const dataUrl = await domtoimage.toPng(flyer, {
            quality: 1,
            scale: 4,
            width: flyer.offsetWidth,
            height: flyer.offsetHeight,
          });

          const link = document.createElement("a");
          link.download = `IGSOSA_${elements.userName.textContent.replace(/\s+/g, "_")}.png`;
          link.href = dataUrl;
          link.click();

          this.innerHTML =
            '<span class="material-symbols-outlined text-green-400">check_circle</span> Flyer Ready!';
        } catch (err) {
          console.error(err);
          this.innerHTML = "Error!";
        } finally {
          /* Disable capture mode */
          document.body.classList.remove("capture-mode");

          setTimeout(() => {
            this.innerHTML = originalContent;
            this.disabled = false;
          }, 2000);
        }
      });
    </script>
  </body>
</html>
